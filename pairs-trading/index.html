<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pairs Trading Study — Daily Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #161616;
  --surface3: #1c1c1c;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --text-muted: #888;
  --text-dim: #444;
  --teal: #3db88a;
  --teal-dim: rgba(61,184,138,0.1);
  --teal-border: rgba(61,184,138,0.2);
  --blue: #4a9eff;
  --blue-dim: rgba(74,158,255,0.1);
  --blue-border: rgba(74,158,255,0.2);
  --purple: #9b7fe8;
  --purple-dim: rgba(155,127,232,0.1);
  --purple-border: rgba(155,127,232,0.2);
  --coral: #e8705a;
  --coral-dim: rgba(232,112,90,0.1);
  --coral-border: rgba(232,112,90,0.2);
  --green: #7ec86a;
  --green-dim: rgba(126,200,106,0.1);
  --green-border: rgba(126,200,106,0.2);
  --gray-dim: rgba(150,150,150,0.08);
  --gray-border: rgba(150,150,150,0.15);
}

html { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }
body { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.25rem 5rem; }

/* Nav */
.nav {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 3rem;
}
.nav-back {
  font-size: 12px; color: var(--text-dim);
  text-decoration: none;
  display: flex; align-items: center; gap: 5px;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--text-muted); }
.nav-sep { color: var(--text-dim); font-size: 12px; }
.nav-current { font-size: 12px; color: var(--text-muted); }

/* Header */
.page-header { margin-bottom: 2.5rem; }
.page-eyebrow {
  font-family: 'Syne', sans-serif; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--teal); margin-bottom: 0.75rem;
}
.page-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 800; line-height: 1.1;
  color: var(--text); margin-bottom: 0.75rem;
}
.page-desc {
  font-size: 0.875rem; color: var(--text-muted);
  font-weight: 300; line-height: 1.7; max-width: 520px;
}

/* Progress header */
.progress-header {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 2rem;
  display: flex; align-items: center; gap: 1.5rem;
  flex-wrap: wrap;
}
.prog-stat { display: flex; flex-direction: column; gap: 3px; }
.prog-stat-val {
  font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800;
  color: var(--text);
}
.prog-stat-lbl { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; }

.prog-bar-wrap { flex: 1; min-width: 120px; }
.prog-bar-track {
  height: 4px; background: var(--border);
  border-radius: 2px; overflow: hidden;
}
.prog-bar-fill {
  height: 100%; background: var(--teal);
  border-radius: 2px; transition: width 0.5s ease;
}
.prog-pct {
  font-size: 11px; color: var(--text-dim);
  font-family: 'Syne', sans-serif; font-weight: 700;
  margin-top: 6px; text-align: right;
}

/* Week separator */
.week-sep {
  display: flex; align-items: center; gap: 12px;
  margin: 2rem 0 1rem;
}
.week-label {
  font-family: 'Syne', sans-serif; font-size: 11px;
  letter-spacing: 0.15em; text-transform: uppercase;
  white-space: nowrap; padding: 3px 12px;
  border-radius: 20px; border: 0.5px solid;
}
.week-line { flex: 1; height: 0.5px; background: var(--border); }

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 8px;
}

/* Day card */
.day-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 1.1rem 1.15rem;
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, opacity 0.2s;
  position: relative; overflow: hidden;
  user-select: none;
}
.day-card:hover { background: var(--surface2); border-color: var(--border-hover); }

.day-card.done { opacity: 0.42; }
.day-card.done .day-check { background: var(--teal); border-color: var(--teal); color: #0a0a0a; }

.day-card-top { display: flex; align-items: center; gap: 8px; }

.day-num {
  font-size: 10px; font-weight: 500;
  padding: 2px 8px; border-radius: 6px;
  border: 0.5px solid;
  font-family: 'Syne', sans-serif;
  white-space: nowrap;
}

.day-check {
  width: 18px; height: 18px; border-radius: 50%;
  border: 0.5px solid var(--border-hover);
  margin-left: auto; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent;
  transition: all 0.2s;
}

.day-concept {
  font-family: 'Syne', sans-serif;
  font-size: 0.88rem; font-weight: 700;
  color: var(--text); line-height: 1.3;
}

.day-tagline {
  font-size: 0.75rem; color: var(--text-muted);
  line-height: 1.5; font-weight: 300;
}

.day-slots {
  display: flex; flex-direction: column; gap: 4px;
  padding-top: 6px; border-top: 0.5px solid var(--border);
}
.slot {
  display: flex; align-items: flex-start; gap: 6px;
  font-size: 11px; color: var(--text-dim); line-height: 1.4;
}
.slot-ico { flex-shrink: 0; font-size: 10px; width: 14px; text-align: center; margin-top: 1px; }

.day-actions {
  display: flex; gap: 5px; flex-wrap: wrap;
  padding-top: 6px; border-top: 0.5px solid var(--border);
}
.action-btn {
  font-size: 10px; padding: 3px 9px;
  border-radius: 20px; border: 0.5px solid;
  cursor: pointer; white-space: nowrap;
  text-decoration: none;
  transition: opacity 0.15s;
  display: inline-block;
}
.action-btn:hover { opacity: 0.7; }
.btn-gen { background: rgba(201,168,76,0.08); color: #c9a84c; border-color: rgba(201,168,76,0.2); }
.btn-ext { background: var(--blue-dim); color: var(--blue); border-color: var(--blue-border); }

/* Flow footer */
.flow-bar {
  margin-top: 2.5rem;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.flow-label {
  font-size: 11px; color: var(--text-dim);
  font-family: 'Syne', sans-serif; letter-spacing: 0.1em;
  text-transform: uppercase; margin-right: 4px;
}
.flow-step {
  font-size: 11px; font-weight: 500; color: var(--text-muted);
  padding: 3px 10px; border-radius: 20px;
  background: var(--surface3); border: 0.5px solid var(--border);
}
.flow-arrow { font-size: 10px; color: var(--text-dim); }

/* Tip banner */
.tip-banner {
  background: var(--teal-dim);
  border: 0.5px solid var(--teal-border);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  margin-bottom: 2rem;
  font-size: 0.82rem; color: #7dd4b0; line-height: 1.65;
}
.tip-banner strong { color: var(--teal); font-weight: 500; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.page-header { animation: fadeUp 0.4s ease both; }
.progress-header { animation: fadeUp 0.4s 0.08s ease both; }
.tip-banner { animation: fadeUp 0.4s 0.12s ease both; }
.cards-grid { animation: fadeUp 0.4s 0.16s ease both; }

@media (max-width: 600px) {
  body { padding: 1.5rem 1rem 4rem; }
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .progress-header { gap: 1rem; }
}
@media (max-width: 400px) {
  .cards-grid { grid-template-columns: 1fr; }
}
</style>
</head>

    tagline:'후보 → spread → z-score → 진입/청산 → 검증',
    slots:['☀️ 전체 흐름도 빈 칸 채우기','🚇 처음부터 끝까지 전략 설명','🌙 내 말로 전략 한 문단 써보기'],
    prompt:'페어트레이딩 전체 전략 흐름을 한국어로 정리해줘. Correlation/Cointegration 후보 선정 → Hedge Ratio로 Spread 계산 → Rolling Z-score 신호 → Entry/Exit 적용 → Sharpe/MDD 검증. 각 단계 한 문단씩.',
    special: true
  }
];

const colorMap = {
  teal:   { bg:'rgba(61,184,138,0.08)', text:'#3db88a', border:'rgba(61,184,138,0.2)', weekBg:'rgba(61,184,138,0.06)', weekText:'#3db88a', weekBorder:'rgba(61,184,138,0.2)' },
  blue:   { bg:'rgba(74,158,255,0.08)', text:'#4a9eff', border:'rgba(74,158,255,0.2)', weekBg:'rgba(74,158,255,0.06)', weekText:'#4a9eff', weekBorder:'rgba(74,158,255,0.2)' },
  purple: { bg:'rgba(155,127,232,0.08)', text:'#9b7fe8', border:'rgba(155,127,232,0.2)', weekBg:'rgba(155,127,232,0.06)', weekText:'#9b7fe8', weekBorder:'rgba(155,127,232,0.2)' },
  coral:  { bg:'rgba(232,112,90,0.08)', text:'#e8705a', border:'rgba(232,112,90,0.2)', weekBg:'rgba(232,112,90,0.06)', weekText:'#e8705a', weekBorder:'rgba(232,112,90,0.2)' },
  green:  { bg:'rgba(126,200,106,0.08)', text:'#7ec86a', border:'rgba(126,200,106,0.2)', weekBg:'rgba(126,200,106,0.06)', weekText:'#7ec86a', weekBorder:'rgba(126,200,106,0.2)' },
  gray:   { bg:'rgba(150,150,150,0.06)', text:'#888', border:'rgba(150,150,150,0.15)', weekBg:'rgba(150,150,150,0.04)', weekText:'#666', weekBorder:'rgba(150,150,150,0.15)' }
};

const done = new Set(JSON.parse(localStorage.getItem('pt_done') || '[]'));

function updateProgress() {
  const n = done.size;
  const pct = Math.round(n / 14 * 100);
  document.getElementById('done-count').textContent = n;
  document.getElementById('remain-count').textContent = 14 - n;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
}

function openClaude(prompt) {
  window.open('https://claude.ai/new?q=' + encodeURIComponent(prompt), '_blank');
}

function buildCards() {
  const container = document.getElementById('curriculum');
  let currentWeek = 0;

  DAYS.forEach(d => {
    const c = colorMap[d.color];

    if (d.week !== currentWeek) {
      currentWeek = d.week;
      const sep = document.createElement('div');
      sep.className = 'week-sep';
      const label = document.createElement('span');
      label.className = 'week-label';
      label.style.cssText = `background:${c.weekBg};color:${c.weekText};border-color:${c.weekBorder}`;
      label.textContent = d.week === 1 ? '1주차 — 개념 기초' : '2주차 — 전략 로직';
      const line = document.createElement('div');
      line.className = 'week-line';
      sep.appendChild(label); sep.appendChild(line);

      if (d.week === 1) {
        const grid = document.createElement('div');
        grid.className = 'cards-grid'; grid.id = 'week1';
        container.appendChild(sep); container.appendChild(grid);
      } else {
        const grid = document.createElement('div');
        grid.className = 'cards-grid'; grid.id = 'week2';
        container.appendChild(sep); container.appendChild(grid);
      }
    }

    const card = document.createElement('div');
    card.className = 'day-card' + (done.has(d.day) ? ' done' : '');

    card.innerHTML = `
      <div class="day-card-top">
        <span class="day-num" style="background:${c.bg};color:${c.text};border-color:${c.border}">${d.day}일차</span>
        <span class="day-check" style="${done.has(d.day) ? 'background:#3db88a;border-color:#3db88a;color:#0a0a0a' : ''}">✓</span>
      </div>
      <div class="day-concept">${d.concept}</div>
      <div class="day-tagline">${d.tagline}</div>
      <div class="day-slots">
        ${d.slots.map(s => `<div class="slot"><span class="slot-ico">${s.split(' ')[0]}</span><span>${s.split(' ').slice(1).join(' ')}</span></div>`).join('')}
      </div>
      <div class="day-actions">
        ${d.prompt ? `<span class="action-btn btn-gen" onclick="event.stopPropagation();openClaude('${d.prompt.replace(/'/g,"\\'").replace(/\n/g,' ')}')">AI 설명 ↗</span>` : ''}
        ${d.ext ? `<a class="action-btn btn-ext" href="${d.ext.url}" target="_blank" onclick="event.stopPropagation()">${d.ext.label} ↗</a>` : ''}
      </div>
    `;

    card.addEventListener('click', () => {
      if (done.has(d.day)) { done.delete(d.day); card.classList.remove('done'); card.querySelector('.day-check').style.cssText=''; }
      else { done.add(d.day); card.classList.add('done'); card.querySelector('.day-check').style.cssText='background:#3db88a;border-color:#3db88a;color:#0a0a0a'; }
      localStorage.setItem('pt_done', JSON.stringify([...done]));
      updateProgress();
    });

    const targetGrid = document.getElementById(d.week === 1 ? 'week1' : 'week2');
    if (targetGrid) targetGrid.appendChild(card);
  });
}

buildCards();
updateProgress();
</script>
</body>
</html>
